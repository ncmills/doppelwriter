<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DoppelWriter — Inputs</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --color-surface: #faf8f4;
    --color-surface-raised: #f1ece3;
    --color-fg: #1c1a17;
    --color-fg-muted: #6b6358;
    --color-border: #e4ded2;
    --color-brand: #c2410c;
    --radius: 2px;
    --font-display: "Space Grotesk", system-ui, sans-serif;
    --font-sans: "Inter", system-ui, sans-serif;
    --motion-fast: 140ms;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--color-surface); color: var(--color-fg); font-family: var(--font-sans); line-height: 1.55; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 520px; margin: 0 auto; padding: 48px 28px 64px; }
  .eyebrow { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--color-fg-muted); font-weight: 600; }
  .topbar { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--color-border); padding-bottom: 16px; margin-bottom: 40px; }
  .optname { font-family: var(--font-display); font-weight: 500; font-size: 13px; color: var(--color-brand); letter-spacing: .02em; }
  h2 { font-family: var(--font-display); font-weight: 700; font-size: 32px; letter-spacing: -0.02em; margin-bottom: 28px; }
  .field { margin-bottom: 24px; }
  .field-label { font-size: 12px; font-weight: 600; color: var(--color-fg-muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; display: block; }
  .field-note { font-size: 12px; color: var(--color-fg-muted); margin-top: 6px; }
  .input, .textarea {
    width: 100%;
    background: var(--color-surface);
    color: var(--color-fg);
    border: 1px solid var(--color-border);
    border-radius: calc(var(--radius) - 2px);
    padding: 11px 13px;
    font-family: var(--font-sans);
    font-size: 15px;
    outline: none;
    transition: border-color var(--motion-fast) ease, box-shadow var(--motion-fast) ease;
  }
  .input::placeholder, .textarea::placeholder { color: var(--color-fg-muted); }
  .input:focus, .textarea:focus {
    border-color: var(--color-brand);
    box-shadow: 0 0 0 3px rgba(194,65,12,.15);
  }
  .textarea { resize: vertical; min-height: 96px; }
  .input-focused {
    border-color: var(--color-brand);
    box-shadow: 0 0 0 3px rgba(194,65,12,.15);
  }
  .focus-caption { font-size: 11px; color: var(--color-brand); margin-top: 5px; opacity: .8; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <span class="eyebrow">DoppelWriter</span>
      <span class="optname">Inputs</span>
    </div>
    <h2>Inputs</h2>

    <div class="field">
      <span class="field-label">Input — default</span>
      <input class="input" placeholder="e.g. your@email.com" />
    </div>

    <div class="field">
      <span class="field-label">Input — focus state</span>
      <input class="input input-focused" value="focused" />
      <span class="focus-caption">Ember ring: 3px rgba(194,65,12,.15)</span>
    </div>

    <div class="field">
      <span class="field-label">Textarea — default</span>
      <textarea class="textarea" placeholder="Paste a few paragraphs you've written to train your voice profile…"></textarea>
      <span class="field-note">Accepts 2–3 paragraphs minimum for best results.</span>
    </div>
  </div>
</body>
</html>
